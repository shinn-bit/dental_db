<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    font-family: 'Noto Sans JP', sans-serif;
    overflow: hidden;
  }

  .wrapper {
    width: 1200px;
    height: 630px;
    background: linear-gradient(160deg, #f0f6ff 0%, #ffffff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 80px;
    gap: 44px;
    position: relative;
  }

  .bg-blob { position: absolute; border-radius: 50%; z-index: 0; }
  .bg-blob.b1 {
    width: 420px; height: 420px;
    background: radial-gradient(circle, #dbeafe 0%, transparent 70%);
    top: -120px; right: -80px;
  }
  .bg-blob.b2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #ede9fe 0%, transparent 70%);
    bottom: -80px; left: -40px;
  }

  /* ヘッダー */
  .top { text-align: center; z-index: 1; }
  .top-label {
    font-size: 13px; font-weight: 700;
    color: #2563eb; letter-spacing: 0.1em; margin-bottom: 10px;
  }
  .headline {
    font-size: 36px; font-weight: 900; color: #0f172a; line-height: 1.4;
  }
  .headline .accent { color: #2563eb; }

  /* 3ステップ横並び */
  .steps {
    display: flex;
    align-items: center;
    gap: 0;
    width: 100%;
    z-index: 1;
  }

  .step {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
    background: #fff;
    border-radius: 24px;
    border: 2px solid #e2e8f0;
    padding: 32px 24px 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    position: relative;
  }

  .step-num {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    background: #2563eb;
    color: #fff;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.08em;
    padding: 4px 16px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .step-icon-wrap {
    width: 72px; height: 72px;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-top: 8px;
  }
  .step-icon-wrap.s1 { background: #dbeafe; }
  .step-icon-wrap.s2 { background: #fef3c7; }
  .step-icon-wrap.s3 { background: #dcfce7; }

  .step-title {
    font-size: 19px; font-weight: 900; color: #0f172a; line-height: 1.4;
  }

  .step-desc {
    font-size: 14px; color: #64748b; line-height: 1.7;
  }

  /* 矢印 */
  .arrow-wrap {
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    z-index: 1;
    margin-top: 16px;
  }

  .arrow-dot { width: 6px; height: 6px; border-radius: 50%; background: #93c5fd; }
  .arrow-head { font-size: 28px; color: #2563eb; line-height: 1; }

  /* サブ訴求タグ */
  .sub-row {
    display: flex;
    gap: 16px;
    z-index: 1;
    align-items: center;
  }

  .sub-label {
    font-size: 13px; color: #94a3b8; font-weight: 700;
  }

  .sub-tag {
    background: #fff;
    border: 1.5px solid #e2e8f0;
    border-radius: 24px;
    padding: 7px 18px;
    font-size: 13px;
    color: #334155;
    font-weight: 700;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>

  <div class="top">
    <div class="top-label">HOW IT WORKS</div>
    <h2 class="headline">
      資料をアップするだけ。<br>
      <span class="accent">あなたの医院専用AIが完成する。</span>
    </h2>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-num">STEP 1</div>
      <div class="step-icon-wrap s1">📄</div>
      <div class="step-title">資料をアップロード</div>
      <div class="step-desc">PDF・Word・画像など<br>形式は問いません</div>
    </div>

    <div class="arrow-wrap">
      <div class="arrow-dot"></div>
      <div class="arrow-dot"></div>
      <div class="arrow-head">›</div>
    </div>

    <div class="step">
      <div class="step-num">STEP 2</div>
      <div class="step-icon-wrap s2">🤖</div>
      <div class="step-title">AIが自動で理解</div>
      <div class="step-desc">OCR・要約・検索登録まで<br>すべて自動で完了</div>
    </div>

    <div class="arrow-wrap">
      <div class="arrow-dot"></div>
      <div class="arrow-dot"></div>
      <div class="arrow-head">›</div>
    </div>

    <div class="step">
      <div class="step-num">STEP 3</div>
      <div class="step-icon-wrap s3">✨</div>
      <div class="step-title">医院専用AIが完成</div>
      <div class="step-desc">チャットで質問するだけで<br>院内資料から即答</div>
    </div>
  </div>

  <div class="sub-row">
    <div class="sub-label">さらに活用できる ▶</div>
    <div class="sub-tag">💬 チャット検索</div>
    <div class="sub-tag">📝 マニュアル自動生成</div>
    <div class="sub-tag">🏦 保険請求AI</div>
  </div>
</div>
</body>
</html>
